name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32-x64
            artifact: TubeFetch-win32-x64
          # Apple Silicon (M1/M2/M3…)
          - os: macos-14
            platform: darwin-arm64
            artifact: TubeFetch-darwin-arm64
          # Intel Mac
          - os: macos-13
            platform: darwin-x64
            artifact: TubeFetch-darwin-x64

    runs-on: ${{ matrix.os }}

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Fetch ffmpeg + build
        run: |
          python scripts/fetch_ffmpeg.py --platform ${{ matrix.platform }}
          python scripts/build_release.py --platform ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Flatten zips
        shell: bash
        run: |
          mkdir -p upload
          find release-assets -name '*.zip' -exec cp {} upload/ \;
          ls -lh upload/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*.zip
          generate_release_notes: true
