name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Fetch ffmpeg + build exe
        run: |
          python scripts/fetch_ffmpeg.py --platform win32-x64
          python scripts/build_release.py --platform win32-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeFetch-win32-x64
          path: dist/TubeFetch-win32-x64.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TubeFetch-win32-x64.zip
